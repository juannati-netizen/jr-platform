name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: MyPy
        run: mypy apps

      - name: Backend tests
        run: pytest

  portal-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install portal
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npm run check

      - name: Portal tests
        run: npm test

      - name: Portal build
        run: npm run build
